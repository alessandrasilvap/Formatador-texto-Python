<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Formatador de Texto</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background:#f4f4f4;
        }

        .container{
            width:700px;
            margin:40px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,.15);
        }

        h1{
            text-align:center;
        }

        textarea{
            width:100%;
            height:180px;
            resize:vertical;
            padding:10px;
            font-size:16px;
            margin-bottom:20px;
        }

        button{
            padding:12px 18px;
            margin:5px;
            cursor:pointer;
            border:none;
            border-radius:6px;
            background:#007bff;
            color:white;
            font-size:15px;
        }

        button:hover{
            background:#0056b3;
        }

        .resultado{
            margin-top:30px;
            background:#eee;
            padding:20px;
            border-radius:8px;
            white-space:pre-wrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Formatador de Texto</h1>

        <form method="POST">
            <textarea name="texto" placeholder="Digite seu texto aqui...">{{ texto }}</textarea><br>

            <button name="opcao" value="maiusculo">
                TUDO MAIÚSCULO
            </button>

            <button name="opcao" value="minusculo">
                Tudo minúsculo
            </button>

            <button name="opcao" value="capitalizar">
                Primeira letra das frases
            </button>

            <button name="opcao" value="espacos">
                Remover espaços extras
            </button>
        </form>

        {% if resultado %}
        <div class="resultado">
            <h3>Resultado</h3>
            {{ resultado }}
        </div>
        {% endif %}
    </div>
</body>
</html>
